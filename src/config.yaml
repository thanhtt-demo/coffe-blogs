site:
  name: 'Ba Tê và Cà Phê'
  site: 'https://bate-caphe.pages.dev'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: false

# Default SEO metadata
metadata:
  title:
    default: 'Ba Tê và Cà Phê'
    template: '%s — Ba Tê và Cà Phê'
  description: 'Blog chia sẻ kiến thức chuyên sâu về cà phê Việt Nam và thế giới – nguồn gốc, rang xay, pha chế và nghiên cứu khoa học.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'Ba Tê và Cà Phê'
    images:
      - url: '~/assets/images/coffee-hero.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@bate_caphe'
    site: '@bate_caphe'
    cardType: summary_large_image

i18n:
  language: vi
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 9

    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'danh-muc'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'chu-de'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'light:only'

  # Giscus comments — lấy repoId và categoryId từ https://giscus.app
  giscus:
    repo: 'thanhtt-demo/coffe-blogs' # ← đổi thành GitHub repo của bạn
    repoId: 'R_kgDORtfjPg' # ← paste từ giscus.app
    category: 'Blog Comments'
    categoryId: 'DIC_kwDORtfjPs4C5LH_' # ← paste từ giscus.app
